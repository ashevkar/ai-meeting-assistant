services:
  - type: web
    name: meeting-assistant-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: meeting-assistant-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: WHISPER_MODEL
        value: base
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 10

  - type: web
    name: meeting-assistant-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile

databases:
  - name: meeting-assistant-db
    databaseName: meeting_assistant
    user: meeting_user
    plan: free
